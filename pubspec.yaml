name: neuroscale_pro
description: "NeuroScale Pro - AI Psychiatry Clinical System for hospital use"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  
  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # Charts & Analytics
  fl_chart: ^0.65.0
  pdf: ^3.10.7
  
  # Voice Input
  speech_to_text: ^7.3.0
  permission_handler: ^11.1.0
  
  # AI/ML - commented out as package may not be available
  # llama_cpp: ^1.2.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  csv: ^5.1.1
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/models/en/
    - assets/models/ta/
    - assets/images/
    - assets/icons/